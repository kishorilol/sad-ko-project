<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cashier.css">
    <title>Cashier Info</title>
</head>
<body style="background:rgb(206, 228, 248) ;">
    <div class="hornav">
        <ul>
            <li class="nam">Supermarket Billing System</li>
            <li class="admin" style="float:right;">
                <div class="circle"></div>
                <select onchange="handleDropdown(this)">
                    <option disabled selected hidden>Admin</option>
                    <option value="logout">LogOut</option>
                </select>
            </li>
        </ul>
    </div>
    <div class="vernav">
        <ul>
            <li><a href="dashboard.html"><div class="imgcont"><img class="img1" src="../image/dash.png"><img class="img2" src="../image/dash2.png"></div>Dashboard</a></li>
            <li><a href="sales.html"><div class="imgcont"><img class="img1" src="../image/sales.png"><img class="img2" src="../image/sales1.png"></div>Sales Report</a></li>
            <li><a href="customer.html"><div class="imgcont"><img class="img1" src="../image/cust.png"><img class="img2" src="../image/cust1.png"></div>Customer</a></li>
            <li><a href="product.html"><div class="imgcont"><img class="img1" src="../image/prod.png"><img class="img2" src="../image/prod1.png"></div>Product</a></li>
            <li><a class="active" href="cashier.html"><div class="imgcont"><img class="img1" src="../image/cash.png"><img class="img2" src="../image/cash1.png"></div>Cashier Info</a></li>
        </ul>
    </div>
    <div class="workspace">
        <h2>Cashier Info</h2>
        <div class="cards">
            <div class="card">
                <div class="card-header">
                    <img src="../image/cashier.png" alt="">
                    <p>Total Cashier</p>
                </div>
                <h3 class="total">10</h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/activec.png" alt="">
                    <p>Active Cashier</p>
                </div>
                <h3 style="color: rgb(8, 223, 8);" class="actives">10</h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/shiftc.png" alt="">
                    <p>On Shift</p>
                </div>
                <h3 class="onshift">10</h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/inactivec.png" alt="">
                    <p>Inactive Cashier</p>
                </div>
                <h3 style="color: red;" class="inactive">10</h3>
            </div>
        </div>
        <div class="table-header">
                <input type="text" placeholder="Search Cashier By Id">
                <select id="category1">
                    <option value="" disabled selected hidden>Select Shift</option>
                    <option value="">All Shift</option>
                    <option value="Morning">Morning</option>
                    <option value="Night">Night</option>
                    <option value="Day">Day</option>
                </select>
                <select id="category2">
                    <option value="" disabled selected hidden>Select Status</option>
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
                <button class="scan-btn" onclick="addCashier()">Add cashier +</button>
        </div>
        <div class="table-section">
            <h3 style="margin-left: 20px;">Cashier Data</h3>
            <div id="popup" class="popup">
                <div class="popup-content">
                    <h3 id="form-title">Add Cashier</h3>

                    <input type="text" id="name" placeholder="Name">
                    <input type="text" id="address" placeholder="Address">
                    <input type="text" id="phone" placeholder="Phone Number">
                    <div id="username-field">
                        <input type="text" id="username" placeholder="Username">
                    </div>
                    <div id="password-field">
                        <input type="password" id="password" placeholder="Password">
                    </div>

                    <select class="form" id="shift">
                        <option value="" disabled selected hidden>Select Shift</option>
                        <option>Morning</option>
                        <option>Night</option>
                        <option>Day</option>
                    </select>

                    <select class="form" id="status">
                        <option value="" disabled selected hidden>Select Status</option>
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>

                    <button onclick="saveCashier()">Save</button>
                    <button onclick="closePopup()">Cancel</button>
                </div>
            </div>
            <table id="table">
                <thead>
                    <tr>
                        <th>Cashier ID</th><th>Name</th><th>Address</th><th>Phone Number</th><th>Shift</th><th>Status</th><th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="pagination">
                <span>&lt;</span>
                <span class="num">1</span>
                <span class="num">2</span>
                <span class="num">3</span>
                <span>&gt;</span>
            </div>
        </div>
    </div>
    <script type="module" src="../javascript/cashier.js">
console.log("this is js..")</script>
</body>
</html>
