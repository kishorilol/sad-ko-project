<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sales.css">
    <title>Sales Report</title>
</head>
<body style="background:rgb(206, 228, 248) ;">
    <div class="hornav">
        <ul>
            <li class="nam">Supermarket Billing System</li>
            <li class="admin" style="float:right;">
                <div class="circle"></div>
                <select onchange="handleDropdown(this)">
                    <option disabled selected hidden>Admin</option>
                    <option value="logout">LogOut</option>
                </select>
            </li>
        </ul>
    </div>
    <div class="vernav">
        <ul>
            <li><a href="dashboard.html"><div class="imgcont"><img class="img1" src="../image/dash.png"><img class="img2" src="../image/dash2.png"></div>Dashboard</a></li>
            <li><a class="active" href="sales.html"><div class="imgcont"><img class="img1" src="../image/sales.png"><img class="img2" src="../image/sales1.png"></div>Sales Report</a></li>
            <li><a href="customer.html"><div class="imgcont"><img class="img1" src="../image/cust.png"><img class="img2" src="../image/cust1.png"></div>Customer</a></li>
            <li><a href="product.html"><div class="imgcont"><img class="img1" src="../image/prod.png"><img class="img2" src="../image/prod1.png"></div>Product</a></li>
            <li><a href="cashier.html"><div class="imgcont"><img class="img1" src="../image/cash.png"><img class="img2" src="../image/cash1.png"></div>Cashier Info</a></li>
        </ul>
    </div>
    <div class="workspace">
        <h2>Sales Report</h2>
        <div class="controls">
                <select id="year">
                </select>

                <button>Generate Report</button>
        </div>

        <div class="cards">
            <div class="card">
                <div class="card-header">
                    <img src="../image/cart.png" alt="">
                    <p>Total Sales</p>
                </div>
                <h3 class="total-sales">1</h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/dollar.png" alt="">
                    <p>Total Cost</p>
                </div>
                <h3 class="total-cost">1</h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/dollar.png" alt="">
                    <p>Total Profit</p>
                </div>
                <h3 class="total-profit">1</h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/box.png" alt="">
                    <p>Total Product Sold</p>
                </div>
                <h3 class="total-product-sold"></h3>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <h3>Product Sales Report</h3>
                <input type="text" id="searchInput" placeholder="Search product...">
            </div>
            <table id="table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Bought Quantity</th>
                        <th>Sold Quantity</th>
                        <th>Avg Cost Price</th>
                        <th>Avg Selling Price</th>
                        <th>Profit/Loss</th>
                    </tr>
                </thead>

                <tbody>
                </tbody>
            </table>

            <div class="pagination">
                <span>&lt;</span>
                <span class="num">1</span>
                <span class="num">2</span>
                <span class="num">3</span>
                <span>&gt;</span>
            </div>
        </div>

        <div class="charts">
            <div class="chart-box">
                <canvas id="top-products"></canvas>
            </div>
            <div class="chart-box">
                <canvas id="profit-trend"></canvas>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../javascript/sales.js"></script>
</body>
</html>
