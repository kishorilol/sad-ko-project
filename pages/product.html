<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/product.css">
    <title>Product</title>
</head>
<body style="background:rgb(206, 228, 248) ;">
    <div class="hornav">
        <ul>
            <li class="nam">Supermarket Billing System</li>
            <li class="admin" style="float:right;">
                <div class="circle"></div>
                <select onchange="handleDropdown(this)">
                    <option disabled selected hidden>Admin</option>
                    <option value="logout">LogOut</option>
                </select>
            </li>
        </ul>
    </div>
    <div class="vernav">
        <ul>
            <li><a href="dashboard.html"><div class="imgcont"><img class="img1" src="../image/dash.png"><img class="img2" src="../image/dash2.png"></div>Dashboard</a></li>
            <li><a href="sales.html"><div class="imgcont"><img class="img1" src="../image/sales.png"><img class="img2" src="../image/sales1.png"></div>Sales Report</a></li>
            <li><a href="customer.html"><div class="imgcont"><img class="img1" src="../image/cust.png"><img class="img2" src="../image/cust1.png"></div>Customer</a></li>
            <li><a class="active" href="product.html"><div class="imgcont"><img class="img1" src="../image/prod.png"><img class="img2" src="../image/prod1.png"></div>Product</a></li>
            <li><a href="cashier.html"><div class="imgcont"><img class="img1" src="../image/cash.png"><img class="img2" src="../image/cash1.png"></div>Cashier Info</a></li>
        </ul>
    </div>
    <div class="workspace">
        <h2>PRODUCT</h2>
        <div class="cards">
            <div class="card">
                <div class="card-header">
                    <img src="../image/box.png" alt="">
                    <p>Total Product</p>
                </div>
                <h3 id="total-product"></h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/low.png" alt="">
                    <p>Low Stock Product</p>
                </div>
                <h3 id="low-stock-product"></h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/time.png" alt="">
                    <p>On Stock Product</p>
                </div>
                <h3 id="on-stock-product"></h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/category.png" alt="">
                    <p>Out Of Stock</p>
                </div>
                <h3 id="out-of-stock"></h3>
            </div>
        </div>
        <div class="scanner">
            <button id="scan-btn" onclick="scanBtn()">Scan Barcode ||| |||||</button>
            <div id="scanner-container"></div>
        </div>
        <div class="form">
            <input type="text" id="barcode" placeholder="Barcode">
            <input type="text" id="name" placeholder="Name">
            <input type="number" id="qty" placeholder="Quantity">
            <input type="number" id="cprice" placeholder="Cost Price">
            <input type="number" id="sprice" placeholder="Selling Price">            
            <div id="batch-btn">
                <button id="add-new-batch">Add New Batch</button>
                <button id="add-new-product">Add New Product</button>
            </div>
        </div>

        <div class="table-section">
            <div id="popup" class="popup">
                <div class="popup-content">
                    <h3 id="form-title">Add Cashier</h3>

                    <input type="text" id="name" placeholder="Name">
                    <input type="text" id="barcode" placeholder="Barcode">
                    <input type="text" id="price" placeholder="Selling Price">

                    <select class="form" id="status">
                        <option value="" disabled selected hidden>Select Status</option>
                        <option>Availabe</option>
                        <option>Unavailabe</option>
                    </select>

                    <button onclick="saveCashier()">Save</button>
                    <button onclick="closePopup()">Cancel</button>
                </div>
            </div>
            <div class="table-header">
                <h3>Products Table</h3>
                <input type="text" id="search-input" placeholder="Search product...">
            </div>
            <table id="table">
                <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Barcode</th><th>Qty</th><th>Price</th><th>Status</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <div class="pagination">
                <span>&lt;</span>
                <span class="num">1</span>
                <span class="num">2</span>
                <span class="num">3</span>
                <span>&gt;</span>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script type="module" src="../javascript/product.js"></script>
</body>
</html>
