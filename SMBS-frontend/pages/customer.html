<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/customer.css">
    <title>Customer</title>
</head>
<body style="background:rgb(206, 228, 248) ;">
    <div class="hornav">
        <ul>
            <li class="nam">Supermarket Billing System</li>
            <li class="admin" style="float:right;">
                <div class="circle"></div>
                <select onchange="handleDropdown(this)">
                    <option disabled selected hidden>Admin</option>
                    <option value="logout">LogOut</option>
                </select>
            </li>
        </ul>
    </div>
    <div class="vernav">
        <ul>
            <li><a href="dashboard.html"><div class="imgcont"><img class="img1" src="../image/dash.png"><img class="img2" src="../image/dash2.png"></div>Dashboard</a></li>
            <li><a href="sales.html"><div class="imgcont"><img class="img1" src="../image/sales.png"><img class="img2" src="../image/sales1.png"></div>Sales Report</a></li>
            <li><a  class="active" href="customer.html"><div class="imgcont"><img class="img1" src="../image/cust.png"><img class="img2" src="../image/cust1.png"></div>Customer</a></li>
            <li><a href="product.html"><div class="imgcont"><img class="img1" src="../image/prod.png"><img class="img2" src="../image/prod1.png"></div>Product</a></li>
            <li><a href="cashier.html"><div class="imgcont"><img class="img1" src="../image/cash.png"><img class="img2" src="../image/cash1.png"></div>Cashier Info</a></li>
        </ul>
    </div>
    <div class="workspace">
        <h2>Customer Info</h2>
        <div class="cards">
            <div class="card">
                <div class="card-header">
                    <img src="../image/cust.png" alt="">
                    <p>Total Customer</p>
                </div>
                <h3 id="total-customer">365</h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/calender.png" alt="">
                    <p>Customer Arrived Today</p>
                </div>
                <h3 id="customer-arrived-today">62</h3>
            </div>

            <div class="card">
                <div class="card-header">
                    <img src="../image/time.png" alt="">
                    <p>Regular Customer</p>
                </div>
                <h3 style="color: greenyellow;" id="regular-customer">12</h3>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <h3 style="align-self: center;">Customers Data</h3>
                <input type="text" id="search-input" placeholder="Search Customer...">
                <select id="address-select">
                    <option value="" disabled selected hidden>Select Address</option>
                    <option value="all">All</option>
                    <option value="kathmandu">Kathmandu</option>
                    <option value="bhaktapur">Bhaktapur</option>
                    <option value="lalitpur">Lalitpur</option>
                    <option value="others">Others</option>
                </select>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Cust.ID</th>
                        <th>Name</th>
                        <th>Phone No</th>
                        <th>Address</th>
                        <th>Last Visited</th>
                    </tr>
                </thead>

                <tbody id="table-body"></tbody>
                    
            </table>

            <div class="pagination">
                <span>&lt;</span>
                <span class="num">1</span>
                <span class="num">2</span>
                <span class="num">3</span>
                <span>&gt;</span>
            </div>
        </div>
    </div>
<script type="module" src="../javascript/customer.js">
</script>
</body>
</html>
