<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supermarket Admin Login</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h2>Supermarket Admin</h2>
            <p class="subtitle">Login to Dashboard</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter admin username" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <p id="errorMsg" style="color:red; font-size:13px;"></p>

                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    // Simple admin credentials (you can change these)
    const adminUser = "admin";
    const adminPass = "1234";

    if (username === adminUser && password === adminPass) {
        // Redirect to dashboard
        window.location.href = "dashboard.html";
    } else {
        document.getElementById("errorMsg").textContent = "Invalid username or password!";
    }
});
</script>

</body>
</html>
